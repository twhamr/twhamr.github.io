<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    {% include head-custom.html %}

{% seo %}
  </head>

  <body>

    <header>
      <div class="container">
        <a id="a-title" href="{{ '/' | relative_url }}">
          <h1>{{ site.title | default: site.github.repository_name }}</h1>
        </a>
        <h2>{{ site.description | default: site.github.project_tagline }}</h2>

        <section id="navigation">
          <a href="{{ '/projects/' | relative_url }}" class="btn"><i class="bi bi-code-square"></i> Projects</a>
          <a href="{{ '/experience/' | relative_url }}" class="btn"><i class="bi bi-briefcase"></i> Experience</a>
          <a href="{{ '/blog/' | relative_url }}" class="btn"><i class="bi bi-stickies"></i> Blog</a>
          <a href="{{ '/contact/' | relative_url }}" class="btn"><i class="bi bi-phone"></i> Contact</a>
        </section>
      </div>
    </header>

    <div class="container">
      <section id="main_content">
        {% include breadcrumbs.html %}
        {{ content }}
      </section>
    </div>

    {% include footer.html %}
  </body>
</html>
